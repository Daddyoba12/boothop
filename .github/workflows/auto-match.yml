name: Auto Match — every 5 minutes

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call auto-match cron
        run: |
          curl -s -f \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://www.boothop.com/api/cron/auto-match
