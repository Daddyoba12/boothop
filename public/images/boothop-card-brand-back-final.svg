<!-- boothop-card-brand-back-final.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="650" viewBox="0 0 1050 650" role="img" aria-label="BootHop business card back">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#0B6E4F"/>
      <stop offset="1" stop-color="#0B4EA6"/>
    </linearGradient>
    <style><![CDATA[
      .bg { fill: url(#g); }
      .title { font-family: Inter, Arial, Helvetica, sans-serif; font-weight:700; font-size:20px; fill:#0B4EA6; }
      .desc { font-family: Inter, Arial, Helvetica, sans-serif; font-size:14px; fill:#111; }
      .bullet { font-family: Inter, Arial, Helvetica, sans-serif; font-size:13px; fill:#111; }
      .cta { font-family: Inter, Arial, Helvetica, sans-serif; font-weight:700; font-size:16px; fill:#0B4EA6; }
      .url { font-family: Inter, Arial, Helvetica, sans-serif; font-size:13px; fill:#0B4EA6; }
    ]]></style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  <g transform="translate(70,70)">
    <rect width="910" height="510" rx="20" fill="#ffffff" opacity="0.96"/>
    <text x="40" y="60" class="title">COMPLIANCE-FIRST DISTRIBUTED LOGISTICS</text>
    <text x="40" y="98" class="desc">Urgent cross-border and same-day logistics powered by verified movement partners, AI-powered customs screening, and structured delivery workflows.</text>
    <g transform="translate(40,150)">
      <text x="0" y="0" class="bullet">&#x2022; AI-powered customs &amp; compliance screening</text>
      <text x="0" y="28" class="bullet">&#x2022; Verified movement network &amp; identity verification</text>
      <text x="0" y="56" class="bullet">&#x2022; Airport-to-airport coordination, manifest &amp; inspection workflows</text>
      <text x="0" y="84" class="bullet">&#x2022; Stripe escrow and secure transaction handling</text>
    </g>
    <image x="640" y="70" width="240" height="240" href="./boothop-qr-titi.png" />
    <text x="640" y="330" class="cta">Scan to watch &#x2014; 20s</text>
    <text x="40" y="420" class="url">links.boothop.com/titi-card</text>
    <text x="40" y="455" class="desc">SMART. VERIFIED. STRUCTURED MOVEMENT.</text>
  </g>
</svg>
