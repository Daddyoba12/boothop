<?xml version="1.0" encoding="utf-8"?>
<!-- boothop-card-final-back.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="650" viewBox="0 0 1050 650" role="img" aria-label="BootHop business card back">
  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#062226"/>
      <stop offset="1" stop-color="#07363f"/>
    </linearGradient>
    <style>
      .bg { fill: url(#g2); }
      .hero { font-family: Inter, Arial, Helvetica, sans-serif; font-weight:800; font-size:40px; fill:#FFCC33; letter-spacing:1px; }
      .sub { font-family: Inter, Arial; font-size:16px; fill:#E6F7FB; }
      .bul { font-family: Inter, Arial; font-size:15px; fill:#111; }
      .url { font-family: Inter, Arial; font-size:13px; fill:#0b4ea6; font-weight:700; }
      .tagline { font-family: Inter, Arial; font-size:13px; fill:#0B4EA6; font-weight:700; }
      .qrLabel { font-family: Inter, Arial; font-size:13px; fill:#0B4EA6; font-weight:700; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" rx="10" ry="10"/>

  <g transform="translate(60,60)">
    <rect width="930" height="520" rx="18" fill="#ffffff" opacity="0.97"/>
    <text x="40" y="50" class="hero">SAME‑DAY. COMPLIANT.</text>
    <text x="40" y="90" class="sub">Enterprise logistics for time‑critical delivery. Aerospace · Pharma · Legal.</text>

    <g transform="translate(40,150)">
      <text x="0" y="0" class="bul">Verified partners • AI customs screening • Stripe escrow</text>
    </g>

    <text x="40" y="220" class="tagline">SMART. VERIFIED. STRUCTURED MOVEMENT.</text>
    <text x="40" y="260" class="url">links.boothop.com/titi-card</text>
  </g>

  <g transform="translate(700,40)">
    <rect x="-12" y="-12" width="260" height="260" rx="20" fill="#ffffff"/>
    <image x="0" y="0" width="236" height="236" href="./boothop-qr-titi.png" />
    <text x="0" y="256" class="qrLabel">Scan to see BootHop in 20s</text>
  </g>

  <text x="60" y="590" font-family="Inter, Arial" font-size="13" fill="#0b4ea6">boothop.com/business | info@boothop.com</text>
</svg>

