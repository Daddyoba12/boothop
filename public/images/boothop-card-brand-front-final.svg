<!-- boothop-card-brand-front-final.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="650" viewBox="0 0 1050 650" role="img" aria-label="BootHop business card front">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#0B6E4F"/>
      <stop offset="1" stop-color="#0B4EA6"/>
    </linearGradient>
    <style><![CDATA[
      .bg { fill: url(#g); }
      .soft { fill: rgba(255,255,255,0.08); }
      .logo { font-family: Inter, Arial, Helvetica, sans-serif; font-weight:800; font-size:72px; fill:#ffffff; }
      .name { font-family: Inter, Arial, Helvetica, sans-serif; font-weight:700; font-size:34px; fill:#ffffff; }
      .title { font-family: Inter, Arial, Helvetica, sans-serif; font-size:16px; fill:rgba(255,255,255,0.92); }
      .small { font-family: Inter, Arial, Helvetica, sans-serif; font-size:14px; fill:rgba(255,255,255,0.92); }
      .tag { font-family: Inter, Arial, Helvetica, sans-serif; font-size:12px; fill:rgba(255,255,255,0.9); }
    ]]></style>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  <rect x="60" y="70" width="180" height="180" rx="28" class="soft"/>
  <text x="150" y="195" text-anchor="middle" class="logo">BH</text>
  <g transform="translate(300,120)">
    <text x="0" y="40" class="name">Titi Olufeko</text>
    <text x="0" y="75" class="title">Founder &amp; CEO</text>
  </g>
  <g transform="translate(300,180)">
    <text x="0" y="115" class="small">07506 553755</text>
    <text x="0" y="140" class="small">titi.olufeko@boothop.com</text>
    <text x="0" y="165" class="small">linkedin.com/in/titi-olufeko-ba4b77402</text>
  </g>
  <text x="60" y="600" font-family="Inter, Arial" font-size="16" fill="rgba(255,255,255,0.85)">https://boothop.com</text>
</svg>
